services:
  # Backend API - Render Web Service
  - type: web
    name: ausclean-api
    env: python
    region: syd
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: ausclean-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ausclean-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false

  # Database - PostgreSQL
  - type: postgres
    name: ausclean-db
    region: syd
    plan: free
    postgresMajorVersion: "15"

  # Redis - Render Redis
  - type: redis
    name: ausclean-redis
    region: syd
    plan: free
    maxmemoryPolicy: allkeys-lru
